sonar.projectKey=AkaZver_zpif-analyzer
sonar.organization=aka-zver
sonar.projectName=ZPIF Analyzer
sonar.projectVersion=1.0

sonar.sources=backend,frontend/src
sonar.tests=backend,frontend/src
sonar.test.inclusions=**/*_test.go,**/*.test.ts,**/*.test.tsx

sonar.go.coverage.reportPaths=backend/coverage.out
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

sonar.exclusions=**/node_modules/**,**/vendor/**,**/dist/**,**/migrations/**,**/*.pb.go
sonar.coverage.exclusions=**/*_test.go,**/*.test.ts,**/*.test.tsx,**/cmd/**,**/migrations/**,**/test/**
