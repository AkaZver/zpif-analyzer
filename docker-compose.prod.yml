version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: zpif-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: zpif_analyzer
      POSTGRES_USER: zpif
      POSTGRES_PASSWORD: ${DB_PASSWORD:-zpif}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zpif -d zpif_analyzer"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zpif-network

  backend:
    image: ${DOCKERHUB_USERNAME}/zpif-backend:${IMAGE_TAG:-latest}
    container_name: zpif-backend
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: zpif
      DB_PASSWORD: ${DB_PASSWORD:-zpif}
      DB_NAME: zpif_analyzer
      DB_SSL_MODE: disable
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      SERVER_PORT: 8080
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_documents:/app/documents
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - zpif-network

  frontend:
    image: ${DOCKERHUB_USERNAME}/zpif-frontend:${IMAGE_TAG:-latest}
    container_name: zpif-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - zpif-network

networks:
  zpif-network:
    driver: bridge

volumes:
  postgres_data:
  backend_documents:
